<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Donation System | Search Blood</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <h1><a href="index.html" style="color:white;text-decoration:none;">BloodBank</a></h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="search_blood.html">Search Blood</a></li>
                                    <li><a href="login.html">Login</a></li>
                    <li><a href="register_donor.html">Register</a></li>
                            </ul>
        </nav>
    </header>

    <main>
        <div class="form-container" style="max-width: 800px;">
            <h2 style="color: var(--primary-red); margin-bottom: 2rem; text-align: center;">Search for Donors</h2>
            
            <form action="search_blood.html" method="GET">
                <div class="grid" style="gap: 1rem; align-items: end;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label for="blood_group">Blood Group *</label>
                        <select id="blood_group" name="blood_group" class="form-control" required>
                            <option value="">Select</option>
                            <option value="A+" >A+</option>
                            <option value="A-" >A-</option>
                            <option value="B+" >B+</option>
                            <option value="B-" >B-</option>
                            <option value="AB+" >AB+</option>
                            <option value="AB-" >AB-</option>
                            <option value="O+" >O+</option>
                            <option value="O-" >O-</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label for="location">Location (City)</label>
                        <input type="text" id="location" name="location" class="form-control" value="" placeholder="e.g. New York">
                    </div>
                    <div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Search</button>
                    </div>
                </div>
            </form>

            
                    </div>
    </main>
</body>
</html>
